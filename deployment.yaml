apiVersion: apps/v1
kind: Deployment
metadata:
  name: spring-petclinic
  labels:
    app: spring-petclinic
spec:
  replicas: 2
  selector:
    matchLabels:
      app: spring-petclinic
  template:
    metadata:
      labels:
        app: spring-petclinic
    spec:
      containers:
        - name: spring-petclinic
          image: cloudexperts/spring-petclinic:f6de71d2b85bd17ae5eb7a6558ad3d2bb2387172
          ports:
            - containerPort: 8080